apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: run-opm-command-oci-ta
  annotations:
    tekton.dev/pipelines.minVersion: 0.12.1
    tekton.dev/tags: konflux
  labels:
    app.kubernetes.io/version: "0.1"
spec:
  description: This task runs an OPM command with user-specified arguments, passed as an array.
  params:
    - name: SOURCE_ARTIFACT
      description: The Trusted Artifact URI pointing to the artifact with
        the application source code.
      type: string
    - name: ociStorage
      description: The OCI repository where the Trusted Artifacts are stored.
      type: string
    - name: OPM_ARGS
      description: The array of arguments to pass to the 'opm' command
        (e.g., [ 'alpha', 'render-template', 'basic', 'v4.18/catalog-template.json']).
      type: array
    - name: OPM_OUTPUT_PATH
      description: Relative path for the opm command's output file (e.g. 'v4.18/catalog/example-operator/catalog.json').
        Relative to the root directory of given source code (Git repository).
      type: string
    - name: IDMS_PATH
      description: Optional, path for ImageDigestMirrorSet file (e.g. '.tekton/images-mirror-set.yaml').
      type: string
      default: ""
  results:
    - name: SOURCE_ARTIFACT
      description: The Trusted Artifact URI pointing to the artifact with
        the application source code with generated file-based catalog from catalog-template.yml.
  volumes:
    - name: workdir
      emptyDir: {}
  stepTemplate:
    volumeMounts:
      - mountPath: /var/workdir
        name: workdir
  steps:
    - name: use-trusted-artifact
      image: quay.io/konflux-ci/build-trusted-artifacts:latest@sha256:635a890e9f0211b4eb5b8c811d6f06b3ed9ff7da952ebad236fbfe52ba36dbf7
      args:
        - use
        - $(params.SOURCE_ARTIFACT)=/var/workdir/source
    - name: run-opm-command
      image: registry.redhat.io/openshift4/ose-operator-registry-rhel9:v4.18
      workingDir: /var/workdir/source
      env:
        - name: OPM_OUTPUT_PATH_PARAM
          value: $(params.OPM_OUTPUT_PATH)
      securityContext:
        runAsUser: 0
      command: ["/bin/bash", "-c"]
      args:
        - |
          set -euo pipefail

          echo "Running OPM command in working directory: $(pwd)"
          echo "OPM Arguments received by script: '$@'"

          # Ensure OPM_OUTPUT_PATH_PARAM is provided
          if [[ -z "${OPM_OUTPUT_PATH_PARAM}" ]]; then
            echo "Error: OPM_OUTPUT_PATH is a mandatory parameter and cannot be empty."
            exit 1
          fi

          # Validate that the path is not absolute
          if [[ "${OPM_OUTPUT_PATH_PARAM}" == /* ]]; then
            echo "Error: OPM_OUTPUT_PATH must be a relative path, but got '${OPM_OUTPUT_PATH_PARAM}'."
            exit 1
          fi

          # Get the directory part of the path
          OUTPUT_DIR=$(dirname "${OPM_OUTPUT_PATH_PARAM}")

          # Create the directory if it's not the current directory '.'
          if [[ "${OUTPUT_DIR}" != "." ]]; then
            echo "Ensuring directory '${OUTPUT_DIR}' exists."
            mkdir -p "${OUTPUT_DIR}"
          fi

          echo "Writing OPM output to file: $(pwd)/${OPM_OUTPUT_PATH_PARAM}"

          # Execute the opm command and redirect its output
          opm "$@" > "${OPM_OUTPUT_PATH_PARAM}"

          echo "OPM command finished"
        - "opm"
        - "$(params.OPM_ARGS[*])"
      computeResources:
        limits:
          memory: 2Gi
        requests:
          cpu: 500m
          memory: 2Gi
    - name: replace-related-images-pullspec-in-catalog
      image: quay.io/konflux-ci/konflux-test@sha256:3619ffde751d337d02f1f61c83c5c39eb87d8091dbe5a9af58ea98577fa09461
      workingDir: /var/workdir/source
      securityContext:
        runAsUser: 0
      when:
        - input: "$(params.IDMS_PATH)"
          operator: notin
          values: ["", "null"]
      command: ["/bin/bash", "-c"]
      args:
        - |
          set -euo pipefail

          IDMS_PATH="$1"
          CATALOG_PATH="$2"

          echo "Starting pullspec replacement using Bash and yq."
          echo "ImageDigestMirrorSet path: ${IDMS_PATH}"
          echo "Catalog file path: ${CATALOG_PATH}"

          if [[ ! -f "${IDMS_PATH}" ]]; then
            echo "Error: ImageDigestMirrorSet file not found at '${IDMS_PATH}'"
            exit 1
          fi
          if [[ ! -f "${CATALOG_PATH}" ]]; then
            echo "Error: Catalog file not found at '${CATALOG_PATH}'"
            exit 1
          fi

          TMP_CATALOG=$(mktemp)
          cp "${CATALOG_PATH}" "${TMP_CATALOG}"

          echo "Parsing ImageDigestMirrorSet to create a mirror map..."
          
          declare -A mirror_map
          
          # FIX 1: Added -r (--raw-output) to prevent yq from adding quotes to the output strings.
          map_data=$(yq -r '.spec.imageDigestMirrors[] | .source + " " + .mirrors[0]' "${IDMS_PATH}")

          if [[ -z "${map_data}" ]]; then
            echo "Warning: No imageDigestMirrors found in ${IDMS_PATH}. Nothing to do."
            exit 0
          fi
          
          while read -r source mirror; do
              mirror_map["$source"]="$mirror"
          done <<< "$map_data"

          # FIX 2: Dynamically determine the output format flag based on file extension.
          output_format_flag=""
          if [[ "${CATALOG_PATH}" == *.json ]]; then
            echo "Detected JSON catalog file. Using JSON output format flag (-j)."
            output_format_flag="-j"
          else
            echo "Detected YAML catalog file (or unknown). Defaulting to YAML output format flag (-y)."
            output_format_flag="-y"
          fi

          echo "Applying mirror replacements to the catalog file..."
          for source in "${!mirror_map[@]}"; do
            mirror="${mirror_map[$source]}"
            echo "  - Replacing prefix '${source}' with '${mirror}'"

            # The yq command now includes the required output format flag for in-place editing.
            yq -i "${output_format_flag}" '(.. | select(has("relatedImages"))) .relatedImages[].image |= (select(startswith("'"$source"'")) | sub("'"$source"'"; "'"$mirror"'"))' "${TMP_CATALOG}"
          done

          mv "${TMP_CATALOG}" "${CATALOG_PATH}"

          echo "Pullspec replacement finished successfully."
        - "bash" # Script name for logging clarity
        - "$(params.IDMS_PATH)"
        - "$(params.OPM_OUTPUT_PATH)"
      computeResources:
        limits:
          memory: 2Gi
        requests:
          cpu: 500m
          memory: 2Gi
    - name: validate-catalog
      image: registry.redhat.io/openshift4/ose-operator-registry-rhel9:v4.18
      workingDir: /var/workdir/source
      env:
        - name: OPM_OUTPUT_PATH_PARAM
          value: $(params.OPM_OUTPUT_PATH)
      securityContext:
        runAsUser: 0
      command: ["/bin/bash", "-c"]
      args:
        - |
          set -euo pipefail
          echo "Running OPM validate command"
          # Get the directory part of the path
          OUTPUT_DIR=$(dirname "${OPM_OUTPUT_PATH_PARAM}")

          echo "Checking: ${OUTPUT_DIR}"
          opm validate "${OUTPUT_DIR}"

          echo "OPM validate finished"
      computeResources:
        requests:
          memory: 3Gi
          cpu: 1000m
        limits:
          memory: 4Gi
          cpu: 2000m
    - name: create-trusted-artifact
      image: quay.io/konflux-ci/build-trusted-artifacts:latest@sha256:edd8e3affc389320b15b9de8a5aedbf7b0463211b77c981563a2cfa20076b0c0
      args:
        - create
        - --store
        - $(params.ociStorage)
        - $(results.SOURCE_ARTIFACT.path)=/var/workdir/source
      computeResources:
        limits:
          memory: 3Gi
        requests:
          cpu: "1"
          memory: 3Gi
